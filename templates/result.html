<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detection Result</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="cyber-bg">
    <canvas id="matrix"></canvas>
    <div class="cyber-overlay">
      <div class="container text-center">
        <div class="card cyber-card mx-auto p-3 p-sm-4" style="max-width: 100%; width: 100%; margin: 0 auto !important;">
          <h2 class="mb-4 cyber-title">🔍 Analysis Result</h2>

          <!-- URL Display -->
          <div class="alert alert-info mb-4">
            <small class="text-muted">Analyzed URL:</small>
            <p class="mb-0" style="word-break: break-all; font-size: 0.9em;">
              <code>{{ result.url }}</code>
            </p>
          </div>

          <!-- Result Status with Visual Indicator -->
          <div class="result-box mb-4">
            {% if result.is_phishing %}
              <div class="status-badge danger-badge">
                <p class="status-emoji">🚨</p>
                <p class="status-text">DO NOT VISIT</p>
                <p class="status-warning">This website is dangerous. It's trying to steal your information.</p>
              </div>
            {% else %}
              <div class="status-badge safe-badge">
                <p class="status-emoji">✅</p>
                <p class="status-text">SAFE TO USE</p>
                <p class="status-warning">This website appears to be legitimate.</p>
              </div>
            {% endif %}
          </div>

          <a href="{{ url_for('index') }}" class="btn cyber-btn mt-4">
            🔁 Check Another URL
          </a>
        </div>
      </div>
    </div>

    <!-- Matrix Background Effect -->
    <script>
      const canvas = document.getElementById("matrix");
      const ctx = canvas.getContext("2d");
      canvas.height = window.innerHeight;
      canvas.width = window.innerWidth;
      const chars = "01";
      const fontSize = 16;
      const columns = canvas.width / fontSize;
      const drops = Array(Math.floor(columns)).fill(1);

      function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00ffff";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
          const text = chars.charAt(Math.floor(Math.random() * chars.length));
          ctx.fillText(text, i * fontSize, drops[i] * fontSize);
          if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
            drops[i] = 0;
          drops[i]++;
        }
      }
      setInterval(draw, 33);
    </script>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }

      .cyber-overlay {
        padding: 15px;
      }

      .cyber-card {
        max-width: 100% !important;
        width: 100%;
        margin: 0 auto !important;
      }

      @media (min-width: 768px) {
        .cyber-card {
          max-width: 600px !important;
        }
      }

      .status-badge {
        padding: 30px 20px;
        border-radius: 15px;
        text-align: center;
        margin: 20px 0;
        word-wrap: break-word;
      }

      .safe-badge {
        background: linear-gradient(135deg, rgba(0, 255, 100, 0.15), rgba(0, 200, 100, 0.15));
        border: 3px solid #00ff64;
        box-shadow: 0 0 20px rgba(0, 255, 100, 0.3);
      }

      .danger-badge {
        background: linear-gradient(135deg, rgba(255, 0, 0, 0.15), rgba(255, 100, 0, 0.15));
        border: 3px solid #ff4444;
        box-shadow: 0 0 20px rgba(255, 100, 0, 0.3);
      }

      .status-emoji {
        font-size: 3.5em;
        margin: 0 0 10px 0;
        display: block;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }

      @media (max-width: 480px) {
        .status-emoji {
          font-size: 2.5em;
        }
      }

      .status-text {
        font-size: 2em;
        font-weight: bold;
        color: #00ffff;
        margin: 10px 0;
        text-transform: uppercase;
        letter-spacing: 2px;
        word-wrap: break-word;
      }

      @media (max-width: 480px) {
        .status-text {
          font-size: 1.5em;
          letter-spacing: 1px;
        }
      }

      .safe-badge .status-text {
        color: #00ff64;
      }

      .danger-badge .status-text {
        color: #ff6644;
      }

      .status-warning {
        font-size: 1.1em;
        color: #ffffff;
        margin: 10px 0 0 0;
        word-wrap: break-word;
        font-weight: 500;
      }

      @media (max-width: 480px) {
        .status-warning {
          font-size: 1em;
        }
      }

      .alert {
        word-wrap: break-word;
        overflow: hidden;
      }

      code {
        word-break: break-all;
        font-size: 0.85em;
      }

      @media (max-width: 480px) {
        code {
          font-size: 0.75em;
        }
      }

      .btn {
        font-weight: bold;
        padding: 12px 30px;
        font-size: 1.1em;
      }

      @media (max-width: 480px) {
        .btn {
          padding: 10px 20px;
          font-size: 1em;
        }
      }
    </style>
  </body>
</html>
